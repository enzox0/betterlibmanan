services:
  - type: web
    name: betterlibmanan
    env: docker
    dockerfilePath: infrastructure/docker/combined.Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        fromDatabase:
          name: betterlibmanan-mongodb
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: betterlibmanan-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: betterlibmanan
          property: host

databases:
  - name: betterlibmanan-mongodb
    databaseName: betterlibmanan
    user: betterlibmanan
    ipAllowList: []
  - name: betterlibmanan-redis
    ipAllowList: []
