<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    
    <!-- SEO Meta Tags (dynamically updated by React based on route) -->
    <title>BetterLibmanan.org | Official Portal</title>

    <meta name="author" content="BetterLibmanan Team" />

    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.betterlibmanan.org/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.betterlibmanan.org/" />
    <meta property="og:site_name" content="BetterLibmanan" />
    <meta property="og:title" content="BetterLibmanan - Modern Library Management System" />
    <meta property="og:description" content="Comprehensive enterprise-grade library management system designed for modern libraries. Streamline cataloging, circulation, and patron management." />

    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.betterlibmanan.org/" />
    <meta name="twitter:title" content="BetterLibmanan - Modern Library Management System" />
    <meta name="twitter:description" content="Comprehensive enterprise-grade library management system designed for modern libraries." />
    <meta name="twitter:image" content="https://www.betterlibmanan.org/twitter-image.jpg" />
    <meta name="twitter:image:alt" content="BetterLibmanan Platform Interface" />
    <meta name="twitter:creator" content="@betterlibmanan" />
    <meta name="twitter:site" content="@betterlibmanan" />
    
    <!-- Favicons & App Icons -->
    <link rel="icon" type="image/x-icon" href="/betterlibmanan-icon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/betterlibmanan.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "BetterLibmanan",
      "applicationCategory": "BusinessApplication",

      "offers": {
        "@type": "Offer",

        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1250"
      },
      "description": "Comprehensive enterprise-grade library management system designed for modern libraries. Streamline cataloging, circulation, and patron management.",
      "url": "https://www.betterlibmanan.org",
      "image": "https://www.betterlibmanan.org/og-image.jpg",
      "publisher": {
        "@type": "Organization",
        "name": "BetterLibmanan",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.betterlibmanan.org/logo.png"

      },
      "featureList": [

        "Circulation Control",
        "Patron Management",

      ]

    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BetterLibmanan",
      "url": "https://www.betterlibmanan.org",

        "https://www.linkedin.com/company/betterlibmanan",
        "https://github.com/betterlibmanan"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-555-123-4567",
        "contactType": "customer support",
        "email": "support@betterlibmanan.org",
        "availableLanguage": ["English"]
      }
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BetterLibmanan",
      "url": "https://www.betterlibmanan.org",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.betterlibmanan.org/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- Security Headers -->
    <!-- CSP is handled by the backend server -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
