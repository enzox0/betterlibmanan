<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
  <head>
    <!-- Primary Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    
    <!-- SEO Meta Tags (dynamically updated by React based on route) -->
    <title>BetterLibmanan.org | Official Portal</title>
    <meta name="description" content="BetterLibmanan is a digital transparency portal for the municipality of Libmanan, Camarines Sur. Access public information, municipal services, and community resources." />
    <meta name="keywords" content="libmanan, transparency portal, municipal portal, local government, public information, camarines sur" />
    <meta name="author" content="BetterLibmanan Team" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.betterlibmanan.org/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.betterlibmanan.org/" />
    <meta property="og:site_name" content="BetterLibmanan" />
    <meta property="og:title" content="BetterLibmanan - Digital Transparency Portal" />
    <meta property="og:description" content="Digital transparency portal for the municipality of Libmanan, Camarines Sur. Access public information, municipal services, and community resources." />
    <meta property="og:image" content="https://www.betterlibmanan.org/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BetterLibmanan Portal Interface" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.betterlibmanan.org/" />
    <meta name="twitter:title" content="BetterLibmanan - Digital Transparency Portal" />
    <meta name="twitter:description" content="Digital transparency portal for the municipality of Libmanan, Camarines Sur." />
    <meta name="twitter:image" content="https://www.betterlibmanan.org/twitter-image.jpg" />
    <meta name="twitter:image:alt" content="BetterLibmanan Portal Interface" />
    <meta name="twitter:creator" content="@betterlibmanan" />
    <meta name="twitter:site" content="@betterlibmanan" />
    
    <!-- Favicons & App Icons -->
    <link rel="icon" type="image/x-icon" href="/betterlibmanan-icon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/betterlibmanan.png" />
    <!-- PWA manifest (generated by vite-plugin-pwa at build time) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BetterLibmanan" />
    <link rel="apple-touch-icon" href="/betterlibmanan.png" />
    
    <!-- Preconnect / DNS-prefetch for Performance -->
    <!-- Google: Fonts + Maps API (used by WeatherMapSection and typography) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://maps.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://maps.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://maps.googleapis.com" />
    <link rel="dns-prefetch" href="https://maps.gstatic.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <!-- Cloudflare R2: native *.r2.dev CDN used for uploaded assets -->
    <link rel="preconnect" href="https://pub.r2.dev" crossorigin />
    <link rel="dns-prefetch" href="https://pub.r2.dev" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BetterLibmanan",
      "description": "Digital transparency portal for the municipality of Libmanan, Camarines Sur. Access public information, municipal services, and community resources.",
      "url": "https://www.betterlibmanan.org",
      "publisher": {
        "@type": "Organization",
        "name": "BetterLibmanan",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.betterlibmanan.org/logo.png"
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.betterlibmanan.org/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BetterLibmanan",
      "url": "https://www.betterlibmanan.org",
      "logo": "https://www.betterlibmanan.org/logo.png",
      "sameAs": [
        "https://www.facebook.com/betterlibmanan",
        "https://twitter.com/betterlibmanan",
        "https://www.linkedin.com/company/betterlibmanan",
        "https://github.com/betterlibmanan"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-555-123-4567",
        "contactType": "customer support",
        "email": "support@betterlibmanan.org",
        "availableLanguage": ["English"]
      }
    }
    </script>
    
    <!-- Security Headers -->
    <!-- CSP is handled by the backend server -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
    
    <!-- Alternative Languages (if applicable) -->
    <link rel="alternate" hreflang="en" href="https://www.betterlibmanan.org/en" />
    <link rel="alternate" hreflang="x-default" href="https://www.betterlibmanan.org/" />
  </head>
  <body>
    <!-- Skip to main content for accessibility -->
    <a href="#root" class="skip-to-main" style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">Skip to main content</a>
    
    <!-- No Script Fallback -->
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: system-ui, -apple-system, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>BetterLibmanan requires JavaScript to be enabled. Please enable JavaScript in your browser settings to access the portal.</p>
      </div>
    </noscript>
    
    <!-- Main Application Root -->
    <div id="root"></div>
    
    <!-- Main Application Script -->
    <script type="module" src="/src/main.tsx"></script>

</html>
