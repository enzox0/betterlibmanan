<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background fill -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="200" fill="#ffffff" opacity="0.03" />
  <circle cx="1100" cy="550" r="150" fill="#ffffff" opacity="0.03" />
  <circle cx="150" cy="500" r="180" fill="#ffffff" opacity="0.03" />

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Accent bar -->
  <rect x="80" y="240" width="6" height="120" fill="url(#accentGrad)" rx="3" />

  <!-- Site name -->
  <text x="110" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">
    BetterLibmanan
  </text>

  <!-- .org suffix -->
  <text x="110" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#93c5fd" letter-spacing="1">
    betterlibmanan.org
  </text>

  <!-- Tagline -->
  <text x="110" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#bfdbfe" opacity="0.85">
    Official Digital Transparency Portal
  </text>
  <text x="110" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#bfdbfe" opacity="0.85">
    Municipality of Libmanan, Camarines Sur, Philippines
  </text>

  <!-- Bottom accent line -->
  <rect x="80" y="520" width="1040" height="2" fill="#ffffff" opacity="0.1" />

  <!-- Footer label -->
  <text x="80" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#93c5fd" opacity="0.6">
    Government Services · Legislation · Transparency · Community
  </text>
</svg>
