# ------------------------------
# Stage 1: HTTP only (for certbot)
# ------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name betterlibmanan.org www.betterlibmanan.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # Default response (uncomment after certbot is done to redirect to HTTPS)
    # return 301 https://$server_name$request_uri;
}

